<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP — Gerador de Relatórios</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <header>
    <img src="/static/xp_logo.png" alt="XP" class="header-logo" />
    <div class="header-text">
      <h1>XP Investimentos</h1>
      <span>/ Gerador de Relatórios Mensais</span>
    </div>
  </header>

  <!-- Client selection -->
  <div class="card">
    <h2>Selecione os clientes</h2>
    <div class="client-list" id="client-list">
      <p class="empty-msg">Carregando clientes...</p>
    </div>
  </div>

  <!-- Actions and progress -->
  <div class="card">
    <div class="actions">
      <button id="btn-generate" disabled>Gerar Relatórios</button>
    </div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p id="status-msg"></p>
  </div>

  <!-- Results -->
  <div class="card" id="results-card" style="display:none">
    <h2>Relatórios gerados</h2>
    <div class="results-list" id="results-list"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
